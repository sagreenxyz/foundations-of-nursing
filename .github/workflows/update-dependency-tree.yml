name: Update Dependency Tree

# Runs automatically whenever the master sprint backlog is updated (i.e. at
# the end of each sprint) or when any chapter content changes.  Can also be
# triggered manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - 'activity/2026-03-15-1210/sprint-backlog.md'
      - 'content/**.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync dependency-tree.html
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN so the push step can write back.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run dependency-tree sync script
        run: node scripts/update-dependency-tree.js

      - name: Commit updated dependency-tree.html (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet dependency-tree.html; then
            git add dependency-tree.html
            git commit -m "chore: auto-sync dependency-tree.html with master backlog [skip ci]"
            git push
          else
            echo "dependency-tree.html is already up-to-date — no commit needed."
          fi
